services:
  mariadb:
    ports:
      - "3306:3306"
    image: mariadb:12
    restart: always
    volumes: 
      - "./database:/var/lib/mysql"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    env_file: ".db.env"
  reviewbot:
    image: ghcr.io/iostpa/reviewbot:latest
    restart: always
    env_file: ".env"
    ports:
      - "3000:3000"
    volumes:
      - ./private-key.pem:/app/private-key.pem:ro  # read-only